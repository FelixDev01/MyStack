services:
  db_mystack:
    image: postgres:latest
    container_name: db_mystack
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: mystackdb
    ports:
      - "5433:5432"

  mystack_api:
      container_name: mystack_api
      build:
        context: .
        dockerfile: MyStack.Api/Dockerfile
      ports:
        - "8080:8080"
      depends_on:
        - db_mystack
      environment:
        - ConnectionStrings__DefaultConnection=Host=db_mystack;Port=5432;Database=mystackdb;Username=postgres;Password=1234
        - ASPNETCORE_ENVIRONMENT=Development      

  mystack-web:
    container_name: mystack_web
    build:
      context: ./MyStack.Web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - mystack_api